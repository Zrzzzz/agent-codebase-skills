name: Skill proposal / improvement
description: Propose a new skill or an improvement to an existing one / 提议新 skill 或改进现有 skill
labels: [enhancement]
body:
  - type: textarea
    id: layer
    attributes:
      label: Which layer of project knowledge does this manage?
      description: "The repo's premise: stable conventions / volatile state (session notes, tasks) / reusable workflows. Where does your idea fit, and why can't an existing skill cover it? / 属于哪一层，为什么现有 skill 覆盖不了"
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What would it generate or do?
      description: Files it creates, hooks it installs, scripts it writes. A sketch of the generated output is ideal.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
    validations:
      required: false
